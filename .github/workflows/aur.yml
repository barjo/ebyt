name: Publish to AUR

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read Zig version
        id: zig-version
        run: echo "version=$(grep '^zig ' .tool-versions | awk '{print $2}')" >> "$GITHUB_OUTPUT"

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ steps.zig-version.outputs.version }}

      - name: Install dependencies
        run: sudo apt-get install -y libx11-dev libxi-dev libsqlite3-dev

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Upload binary to release
        run: gh release upload "$GITHUB_REF_NAME" zig-out/bin/ebyt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute checksums
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SRC_SHA=$(curl -sL "https://github.com/barjo/ebyt/archive/v${VERSION}.tar.gz" | sha256sum | awk '{print $1}')
          BIN_SHA=$(sha256sum zig-out/bin/ebyt | awk '{print $1}')
          SVC_SHA=$(curl -sL "https://raw.githubusercontent.com/barjo/ebyt/v${VERSION}/ebyt.service" | sha256sum | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "src_sha=$SRC_SHA" >> "$GITHUB_OUTPUT"
          echo "bin_sha=$BIN_SHA" >> "$GITHUB_OUTPUT"
          echo "svc_sha=$SVC_SHA" >> "$GITHUB_OUTPUT"

      - name: Generate ebyt PKGBUILD
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          SRC_SHA=${{ steps.meta.outputs.src_sha }}
          cat > PKGBUILD <<'EOF'
          pkgname=ebyt
          pkgver=VERSION_PLACEHOLDER
          pkgrel=1
          pkgdesc="Minimal X11 activity tracker"
          arch=('x86_64')
          url='https://github.com/barjo/ebyt'
          license=('Apache-2.0')
          depends=('libx11' 'libxi' 'sqlite')
          makedepends=('zig>=0.14.0')
          provides=('ebyt')
          conflicts=('ebyt-bin')
          options=(!debug)
          source=("$pkgname-$pkgver.tar.gz::https://github.com/barjo/ebyt/archive/v$pkgver.tar.gz")
          sha256sums=('SHA_PLACEHOLDER')

          build() {
              cd "$pkgname-$pkgver"
              zig build -Doptimize=ReleaseSafe
          }

          package() {
              cd "$pkgname-$pkgver"
              install -Dm755 zig-out/bin/ebyt "$pkgdir/usr/bin/ebyt"
              install -Dm644 ebyt.service "$pkgdir/usr/lib/systemd/user/ebyt.service"
          }
          EOF
          sed -i 's/^          //' PKGBUILD
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" PKGBUILD
          sed -i "s/SHA_PLACEHOLDER/$SRC_SHA/" PKGBUILD

      - name: Generate ebyt-bin PKGBUILD
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          BIN_SHA=${{ steps.meta.outputs.bin_sha }}
          SVC_SHA=${{ steps.meta.outputs.svc_sha }}
          cat > PKGBUILD-bin <<'EOF'
          pkgname=ebyt-bin
          pkgver=VERSION_PLACEHOLDER
          pkgrel=1
          pkgdesc="Minimal X11 activity tracker (prebuilt binary)"
          arch=('x86_64')
          url='https://github.com/barjo/ebyt'
          license=('Apache-2.0')
          depends=('libx11' 'libxi' 'sqlite')
          provides=('ebyt')
          conflicts=('ebyt')
          options=(!debug)
          source=("ebyt-$pkgver::https://github.com/barjo/ebyt/releases/download/v$pkgver/ebyt" "ebyt.service::https://raw.githubusercontent.com/barjo/ebyt/v$pkgver/ebyt.service")
          sha256sums=('BIN_SHA_PLACEHOLDER' 'SVC_SHA_PLACEHOLDER')

          package() {
              install -Dm755 "$srcdir/ebyt-$pkgver" "$pkgdir/usr/bin/ebyt"
              install -Dm644 "$srcdir/ebyt.service" "$pkgdir/usr/lib/systemd/user/ebyt.service"
          }
          EOF
          sed -i 's/^          //' PKGBUILD-bin
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/" PKGBUILD-bin
          sed -i "s/BIN_SHA_PLACEHOLDER/$BIN_SHA/" PKGBUILD-bin
          sed -i "s/SVC_SHA_PLACEHOLDER/$SVC_SHA/" PKGBUILD-bin

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          printf 'Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur\n' >> ~/.ssh/config

      - name: Generate .SRCINFO files
        run: |
          gen_srcinfo() {(
            local pkg="$1"
            eval "$(grep -E '^(pkgname|pkgver|pkgrel|pkgdesc|url|license)=' "$pkg")"
            eval "$(grep -E '^(arch|depends|makedepends|provides|conflicts|options|source|sha256sums)=' "$pkg")"
            local T=$'\t'
            echo "pkgbase = ${pkgname}"
            echo "${T}pkgdesc = ${pkgdesc}"
            echo "${T}pkgver = ${pkgver}"
            echo "${T}pkgrel = ${pkgrel}"
            echo "${T}url = ${url}"
            for a in "${arch[@]}"; do echo "${T}arch = ${a}"; done
            echo "${T}license = ${license}"
            for d in "${makedepends[@]}"; do echo "${T}makedepends = ${d}"; done
            for d in "${depends[@]}"; do echo "${T}depends = ${d}"; done
            for p in "${provides[@]}"; do echo "${T}provides = ${p}"; done
            for c in "${conflicts[@]}"; do echo "${T}conflicts = ${c}"; done
            for o in "${options[@]}"; do echo "${T}options = ${o}"; done
            for s in "${source[@]}"; do echo "${T}source = ${s}"; done
            for s in "${sha256sums[@]}"; do echo "${T}sha256sums = ${s}"; done
            echo ""
            echo "pkgname = ${pkgname}"
          )}
          gen_srcinfo PKGBUILD > SRCINFO-ebyt
          gen_srcinfo PKGBUILD-bin > SRCINFO-bin

      - name: Publish ebyt to AUR
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          git clone ssh://aur@aur.archlinux.org/ebyt.git /tmp/aur-ebyt
          cp PKGBUILD /tmp/aur-ebyt/
          cp SRCINFO-ebyt /tmp/aur-ebyt/.SRCINFO
          cd /tmp/aur-ebyt
          git config user.name "barjo"
          git config user.email "barjo@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || (git commit -m "Update to ${VERSION}" && git push)

      - name: Publish ebyt-bin to AUR
        run: |
          VERSION=${{ steps.meta.outputs.version }}
          git clone ssh://aur@aur.archlinux.org/ebyt-bin.git /tmp/aur-ebyt-bin
          cp PKGBUILD-bin /tmp/aur-ebyt-bin/PKGBUILD
          cp SRCINFO-bin /tmp/aur-ebyt-bin/.SRCINFO
          cd /tmp/aur-ebyt-bin
          git config user.name "barjo"
          git config user.email "barjo@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || (git commit -m "Update to ${VERSION}" && git push)
